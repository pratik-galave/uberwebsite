<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Velocity - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "secondary-fixed": "#62ff96",
            "surface-variant": "#353436",
            "on-tertiary-fixed": "#20005f",
            "tertiary-fixed": "#e8deff",
            "surface-container-low": "#1c1b1c",
            "outline-variant": "#3b494c",
            "surface": "#131314",
            "surface-container-highest": "#353436",
            "secondary-fixed-dim": "#00e475",
            "error-container": "#93000a",
            "on-primary-fixed": "#001f24",
            "on-primary-fixed-variant": "#004f58",
            "outline": "#849396",
            "primary-fixed-dim": "#00daf3",
            "surface-bright": "#3a393a",
            "on-secondary-fixed-variant": "#005226",
            "secondary": "#7dffa2",
            "surface-container-lowest": "#0e0e0f",
            "secondary-container": "#05e777",
            "on-secondary-container": "#00622e",
            "inverse-primary": "#006875",
            "on-background": "#e5e2e3",
            "on-tertiary-fixed-variant": "#4f00d0",
            "on-secondary-fixed": "#00210b",
            "primary": "#c3f5ff",
            "on-primary": "#00363d",
            "on-error-container": "#ffdad6",
            "on-primary-container": "#00626e",
            "surface-container-high": "#2a2a2b",
            "primary-container": "#00e5ff",
            "inverse-on-surface": "#313031",
            "on-surface": "#e5e2e3",
            "surface-dim": "#131314",
            "inverse-surface": "#e5e2e3",
            "on-surface-variant": "#bac9cc",
            "on-tertiary-container": "#622be5",
            "surface-tint": "#00daf3",
            "primary-fixed": "#9cf0ff",
            "tertiary-container": "#d6c9ff",
            "on-secondary": "#003918",
            "surface-container": "#201f20",
            "error": "#ffb4ab",
            "tertiary-fixed-dim": "#cdbdff",
            "background": "#131314",
            "on-tertiary": "#370096",
            "tertiary": "#f1e9ff",
            "on-error": "#690005"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "unit": "4px",
            "stack-md": "16px",
            "container-margin": "24px",
            "stack-sm": "8px",
            "safe-area-bottom": "44px",
            "gutter": "16px",
            "stack-lg": "32px"
          },
          "fontFamily": {
            "display-xl": ["Inter"],
            "headline-lg": ["Inter"],
            "label-caps": ["Inter"],
            "body-lg": ["Inter"],
            "body-md": ["Inter"],
            "headline-md": ["Inter"],
            "data-mono": ["Inter"]
          },
          "fontSize": {
            "display-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
            "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700" }],
            "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
            "data-mono": ["14px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500" }]

        }
      }
    }
  </script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center font-body-md text-body-md relative overflow-hidden antialiased">
<!-- Dynamic Atmospheric Background -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-40 mix-blend-luminosity" data-alt="high end luxury sports car interior dashboard at night with blurred neon city lights reflection" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBRHjTs6aGbunUfpggm1QzPS7RIEwYwIxeIaF248bKWKkoHmMDRyhi1ABnp15OK1yCTZDF83LYSp6ldcwLkDWm7Ojd_c5OnPuqlLPd9L0aVtUBxrv0_IGGzgST099fTENgpwQMMIyk0f7nbDDBHKXo-L9yV1Ke_gGxnEJFLP8DEeGBS-_JP02-WqJ8sCIyCamCeXShd20bXJRkkDUzqgKjQ0lKOLW8x-oN3-CTyjEnYA3w_oZdgio5TNAvKMjD49NXA9XGVzPqNPffK');"></div>
<div class="absolute inset-0 z-0 bg-gradient-to-b from-background/80 via-background/95 to-background backdrop-blur-md"></div>
<main class="relative z-10 w-full max-w-md px-container-margin py-stack-lg flex flex-col h-full overflow-y-auto">
<!-- Header / Brand -->
<header class="flex flex-col items-center justify-center mb-stack-lg mt-stack-md shrink-0">
<h1 class="font-display-xl text-display-xl text-primary-container tracking-tighter mb-unit drop-shadow-[0_0_20px_rgba(0,229,255,0.2)]">VELOCITY</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant text-center">Request your first exclusive ride.</p>
</header>
<!-- Signup Glass Card -->
<div class="bg-surface-variant/40 backdrop-blur-3xl rounded-xl border-t border-white/10 shadow-[0_20px_40px_rgba(0,0,0,0.6)] p-container-margin shrink-0 relative overflow-hidden">
<!-- Subtle top gradient glow on card edge -->
<div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-primary-container/30 to-transparent"></div>
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Full Name Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors" data-icon="person">person</span>
<input class="w-full bg-surface border border-outline-variant/50 rounded-lg py-3 pl-12 pr-4 font-body-md text-body-md text-on-background placeholder:text-on-surface-variant focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>
<!-- Email Input (Success State Example) -->
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors" data-icon="mail">mail</span>
<!-- Applied success validation styling here -->
<input class="w-full bg-surface border border-secondary-fixed/50 rounded-lg py-3 pl-12 pr-12 font-body-md text-body-md text-on-background focus:outline-none focus:border-secondary-fixed focus:ring-1 focus:ring-secondary-fixed transition-all" placeholder="name@domain.com" required="" type="email" value="jane@velocity.com"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-secondary-fixed" data-icon="check_circle">check_circle</span>
</div>
</div>
<!-- Phone Number Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Phone Number</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors" data-icon="phone_iphone">phone_iphone</span>
<input class="w-full bg-surface border border-outline-variant/50 rounded-lg py-3 pl-12 pr-4 font-body-md text-body-md text-on-background placeholder:text-on-surface-variant focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" placeholder="+1 (555) 000-0000" required="" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface border border-outline-variant/50 rounded-lg py-3 pl-12 pr-12 font-body-md text-body-md text-on-background placeholder:text-on-surface-variant focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-background transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Terms and Conditions Custom Checkbox -->
<div class="flex items-start gap-3 mt-unit">
<div class="relative flex items-center justify-center w-5 h-5 rounded border border-outline-variant bg-surface cursor-pointer shrink-0 mt-[2px]">
<input class="peer appearance-none absolute inset-0 w-full h-full cursor-pointer rounded checked:bg-primary-container checked:border-primary-container transition-all focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-1 focus:ring-offset-surface-variant" required="" type="checkbox"/>
<span class="material-symbols-outlined text-on-primary-fixed text-[14px] opacity-0 peer-checked:opacity-100 pointer-events-none z-10 transition-opacity" data-icon="check" style="font-variation-settings: 'wght' 600;">check</span>
</div>
<p class="font-body-md text-on-surface-variant text-[14px] leading-snug">
            I agree to Velocity's <a class="text-primary-container hover:text-primary-fixed hover:underline transition-colors" href="#">Terms of Service</a> and <a class="text-primary-container hover:text-primary-fixed hover:underline transition-colors" href="#">Privacy Policy</a>.
          </p>
</div>
<!-- Submit Action -->
<button class="w-full bg-gradient-to-r from-primary-container to-primary-fixed text-on-primary-fixed font-headline-md text-[18px] py-4 rounded-lg mt-stack-sm shadow-[0_0_15px_rgba(0,229,255,0.3)] hover:shadow-[0_0_25px_rgba(0,229,255,0.5)] hover:scale-[0.98] transition-all duration-300" type="submit">
          Create Account
        </button>
</form>
</div>
<!-- Alternative Action -->
<div class="mt-stack-lg text-center pb-safe-area-bottom shrink-0">
<p class="font-body-md text-body-md text-on-surface-variant">
        Already a member? <a class="text-primary-container hover:text-primary-fixed font-medium transition-colors ml-1" href="#">Sign In</a>
</p>
</div>
</main>
</body></html>
