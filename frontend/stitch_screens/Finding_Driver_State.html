</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full border-b z-50 bg-[#050505]/70 backdrop-blur-3xl shadow-2xl border-white/10 font-inter tracking-tight antialiased">
<div class="flex justify-between items-center w-full px-6 py-4">

<div class="flex items-center gap-4 text-cyan-400">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0;">notifications</span>
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0;">account_circle</span>
</div>
</div>
</header>

<main class="relative z-10 h-full flex flex-col items-center justify-center px-container-margin pt-[72px] pb-safe-area-bottom">
<!-- Radar Visualization -->
<div class="relative flex items-center justify-center w-[320px] h-[320px] mb-stack-lg">
<!-- Outer Ring -->
<div class="absolute inset-0 rounded-full border-[0.5px] border-primary-container/20 bg-primary-container/[0.02] shadow-[0_0_60px_rgba(0,229,255,0.05)]"></div>

<span class="material-symbols-outlined text-on-primary-fixed text-[32px]" style="font-variation-settings: 'FILL' 1;">satellite_alt</span>
</div>
<!-- Floating Data Points (Decorative) -->
<div class="absolute top-[20%] left-[20%] w-[4px] h-[4px] rounded-full bg-primary-fixed shadow-[0_0_8px_rgba(156,240,255,1)]"></div>

                Connecting you with a premium driver...
            </h1>
<p class="font-data-mono text-data-mono text-primary-fixed/80 uppercase tracking-widest">
                Establishing uplink
            </p>
</div>
</main>

<div class="absolute bottom-0 w-full pb-safe-area-bottom pt-8 px-container-margin flex justify-center z-20 bg-gradient-to-t from-background via-background/80 to-transparent">
