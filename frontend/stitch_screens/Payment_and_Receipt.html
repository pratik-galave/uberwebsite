<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Velocity - Payment</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for a cleaner look if content overflows */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#62ff96",
                        "surface-variant": "#353436",
                        "on-tertiary-fixed": "#20005f",
                        "tertiary-fixed": "#e8deff",
                        "surface-container-low": "#1c1b1c",
                        "outline-variant": "#3b494c",
                        "surface": "#131314",
                        "surface-container-highest": "#353436",
                        "secondary-fixed-dim": "#00e475",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#001f24",
                        "on-primary-fixed-variant": "#004f58",
                        "outline": "#849396",
                        "primary-fixed-dim": "#00daf3",
                        "surface-bright": "#3a393a",
                        "on-secondary-fixed-variant": "#005226",
                        "secondary": "#7dffa2",
                        "surface-container-lowest": "#0e0e0f",
                        "secondary-container": "#05e777",
                        "on-secondary-container": "#00622e",
                        "inverse-primary": "#006875",
                        "on-background": "#e5e2e3",
                        "on-tertiary-fixed-variant": "#4f00d0",
                        "on-secondary-fixed": "#00210b",
                        "primary": "#c3f5ff",
                        "on-primary": "#00363d",
                        "on-error-container": "#ffdad6",
                        "on-primary-container": "#00626e",
                        "surface-container-high": "#2a2a2b",
                        "primary-container": "#00e5ff",
                        "inverse-on-surface": "#313031",
                        "on-surface": "#e5e2e3",
                        "surface-dim": "#131314",
                        "inverse-surface": "#e5e2e3",
                        "on-surface-variant": "#bac9cc",
                        "on-tertiary-container": "#622be5",
                        "surface-tint": "#00daf3",
                        "primary-fixed": "#9cf0ff",
                        "tertiary-container": "#d6c9ff",
                        "on-secondary": "#003918",
                        "surface-container": "#201f20",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#cdbdff",
                        "background": "#131314",
                        "on-tertiary": "#370096",
                        "tertiary": "#f1e9ff",
                        "on-error": "#690005"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "stack-md": "16px",
                        "container-margin": "24px",
                        "stack-sm": "8px",
                        "safe-area-bottom": "44px",
                        "gutter": "16px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "display-xl": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "data-mono": ["Inter"]
                    },
                    "fontSize": {
                        "display-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "data-mono": ["14px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col items-center overflow-x-hidden antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Transactional Layout Wrapper (No global nav) -->
<main class="w-full max-w-md flex flex-col min-h-screen relative pb-safe-area-bottom">
<!-- Minimal Header -->
<header class="flex justify-between items-center px-container-margin py-stack-md sticky top-0 z-50 bg-background/80 backdrop-blur-md">
<button class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-primary-container">lock</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Secure Checkout</span>
</div>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<div class="flex-1 px-container-margin flex flex-col gap-stack-lg pt-stack-md">
<!-- Amount Hero -->
<div class="flex flex-col items-center text-center space-y-stack-sm">
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Total Due</p>
<h1 class="font-display-xl text-display-xl text-primary-container drop-shadow-[0_0_15px_rgba(0,229,255,0.15)]">$385.00</h1>
</div>
<!-- Glassmorphic Receipt Breakdown -->
<div class="bg-surface-variant/20 backdrop-blur-3xl border-t border-outline-variant/30 rounded-xl p-stack-md flex flex-col gap-stack-md shadow-[0_10px_40px_rgba(0,0,0,0.5)]">
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Base Fare</span>
<span class="font-data-mono text-data-mono text-on-surface">$250.00</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Distance (42 mi)</span>
<span class="font-data-mono text-data-mono text-on-surface">$85.00</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Wait Time (15 min)</span>
<span class="font-data-mono text-data-mono text-on-surface">$25.00</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Tolls &amp; Fees</span>
<span class="font-data-mono text-data-mono text-on-surface">$25.00</span>
</div>
<div class="h-[1px] w-full bg-gradient-to-r from-transparent via-outline-variant/50 to-transparent my-unit"></div>
<div class="flex justify-between items-center">
<span class="font-body-lg text-body-lg text-on-surface font-medium">Subtotal</span>
<span class="font-data-mono text-data-mono text-on-surface">$385.00</span>
</div>
</div>
<!-- Tip Selection -->
<div class="flex flex-col gap-stack-sm">
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase px-unit">Add Gratuity</p>
<div class="grid grid-cols-4 gap-2">
<!-- Inactive Tip -->
<button class="bg-surface-container-high/50 border border-outline-variant/30 rounded-lg py-stack-sm flex flex-col items-center justify-center transition-colors hover:bg-surface-container-highest">
<span class="font-body-md text-body-md text-on-surface">10%</span>
<span class="font-data-mono text-data-mono text-on-surface-variant text-[10px] mt-1">+$38</span>
</button>
<!-- Inactive Tip -->
<button class="bg-surface-container-high/50 border border-outline-variant/30 rounded-lg py-stack-sm flex flex-col items-center justify-center transition-colors hover:bg-surface-container-highest">
<span class="font-body-md text-body-md text-on-surface">15%</span>
<span class="font-data-mono text-data-mono text-on-surface-variant text-[10px] mt-1">+$57</span>
</button>
<!-- Active Tip (Glowing) -->
<button class="bg-primary-container/10 border border-primary-container text-primary-container rounded-lg py-stack-sm flex flex-col items-center justify-center shadow-[0_0_15px_rgba(0,229,255,0.2)]">
<span class="font-body-md text-body-md font-medium">20%</span>
<span class="font-data-mono text-data-mono text-[10px] mt-1 opacity-80">+$77</span>
</button>
<!-- Custom Tip -->
<button class="bg-surface-container-high/50 border border-outline-variant/30 rounded-lg py-stack-sm flex items-center justify-center transition-colors hover:bg-surface-container-highest">
<span class="material-symbols-outlined text-[20px] text-on-surface-variant">edit</span>
</button>
</div>
</div>
<!-- Payment Method -->
<div class="flex flex-col gap-stack-sm mt-stack-sm">
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase px-unit">Payment Method</p>
<button class="w-full bg-surface-container border border-outline-variant/50 rounded-xl p-4 flex items-center justify-between hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-4">
<div class="w-12 h-8 bg-black rounded flex items-center justify-center border border-white/10">
<!-- Placeholder for Apple Pay / Card Logo -->
<span class="material-symbols-outlined text-[24px] text-white">wallet</span>
</div>
<div class="flex flex-col items-start">
<span class="font-body-md text-body-md text-on-surface font-medium">Apple Pay</span>
<span class="font-data-mono text-data-mono text-on-surface-variant text-[12px]">Default</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</div>
</div>
<!-- Action Area (Sticky Bottom) -->
<div class="w-full p-container-margin mt-auto bg-gradient-to-t from-background via-background to-transparent pb-[calc(24px+env(safe-area-inset-bottom))]">
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-4 rounded-full shadow-[0_0_20px_rgba(0,229,255,0.25)] hover:shadow-[0_0_30px_rgba(0,229,255,0.4)] hover:bg-primary transition-all duration-300 flex items-center justify-center gap-2">
                Authorize Payment
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</main>
</body></html>
