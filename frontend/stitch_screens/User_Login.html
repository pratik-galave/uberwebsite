<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Velocity - Login</title>
<!-- Google Fonts & Material Symbols -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#62ff96",
                        "surface-variant": "#353436",
                        "on-tertiary-fixed": "#20005f",
                        "tertiary-fixed": "#e8deff",
                        "surface-container-low": "#1c1b1c",
                        "outline-variant": "#3b494c",
                        "surface": "#131314",
                        "surface-container-highest": "#353436",
                        "secondary-fixed-dim": "#00e475",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#001f24",
                        "on-primary-fixed-variant": "#004f58",
                        "outline": "#849396",
                        "primary-fixed-dim": "#00daf3",
                        "surface-bright": "#3a393a",
                        "on-secondary-fixed-variant": "#005226",
                        "secondary": "#7dffa2",
                        "surface-container-lowest": "#0e0e0f",
                        "secondary-container": "#05e777",
                        "on-secondary-container": "#00622e",
                        "inverse-primary": "#006875",
                        "on-background": "#e5e2e3",
                        "on-tertiary-fixed-variant": "#4f00d0",
                        "on-secondary-fixed": "#00210b",
                        "primary": "#c3f5ff",
                        "on-primary": "#00363d",
                        "on-error-container": "#ffdad6",
                        "on-primary-container": "#00626e",
                        "surface-container-high": "#2a2a2b",
                        "primary-container": "#00e5ff",
                        "inverse-on-surface": "#313031",
                        "on-surface": "#e5e2e3",
                        "surface-dim": "#131314",
                        "inverse-surface": "#e5e2e3",
                        "on-surface-variant": "#bac9cc",
                        "on-tertiary-container": "#622be5",
                        "surface-tint": "#00daf3",
                        "primary-fixed": "#9cf0ff",
                        "tertiary-container": "#d6c9ff",
                        "on-secondary": "#003918",
                        "surface-container": "#201f20",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#cdbdff",
                        "background": "#131314",
                        "on-tertiary": "#370096",
                        "tertiary": "#f1e9ff",
                        "on-error": "#690005"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "stack-md": "16px",
                        "container-margin": "24px",
                        "stack-sm": "8px",
                        "safe-area-bottom": "44px",
                        "gutter": "16px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "display-xl": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "data-mono": ["Inter"]
                    },
                    "fontSize": {
                        "display-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "data-mono": ["14px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden antialiased">
<!-- Abstract Background Gradients -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary-container/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-on-tertiary-container/5 blur-[150px] rounded-full pointer-events-none"></div>
<!-- Main Content Container -->
<main class="w-full max-w-[420px] px-container-margin z-10">
<!-- Glassmorphic Login Card -->
<div class="bg-surface-variant/40 backdrop-blur-[40px] border border-outline/20 rounded-xl p-stack-lg shadow-[0_20px_40px_rgba(0,0,0,0.4)] relative overflow-hidden">
<!-- Subtle top edge highlight -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
<!-- Brand Header -->
<div class="text-center mb-stack-lg">
<h1 class="font-display-xl text-display-xl text-primary-container tracking-tighter mb-stack-sm">VELOCITY</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your account</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-md">
<!-- Email/Phone Input -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant pl-1 uppercase" for="identifier">Email or Phone</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant/70 text-[20px] pointer-events-none">person</span>
<input class="w-full bg-surface-container-lowest/60 border border-outline/30 rounded-lg pl-12 pr-4 py-3 text-on-surface font-body-md text-body-md focus:border-primary-container focus:outline-none focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-on-surface-variant/40" id="identifier" placeholder="Enter your email or phone" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-stack-sm">
<div class="flex justify-between items-center pl-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-label-caps text-label-caps text-primary-container hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant/70 text-[20px] pointer-events-none">lock</span>
<input class="w-full bg-surface-container-lowest/60 border border-outline/30 rounded-lg pl-12 pr-4 py-3 text-on-surface font-body-md text-body-md focus:border-primary-container focus:outline-none focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-on-surface-variant/40" id="password" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 text-on-surface-variant/70 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full mt-stack-sm bg-gradient-to-r from-primary-container to-[#00B8D4] text-on-primary-fixed font-label-caps text-label-caps py-4 rounded-lg shadow-[0_0_20px_rgba(0,229,255,0.25)] hover:shadow-[0_0_25px_rgba(0,229,255,0.4)] transition-all active:scale-[0.98] uppercase tracking-widest flex justify-center items-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-stack-lg">
<div class="flex-1 h-px bg-outline/20"></div>
<span class="font-data-mono text-data-mono text-on-surface-variant uppercase">Or continue with</span>
<div class="flex-1 h-px bg-outline/20"></div>
</div>
<!-- Social Logins -->
<div class="flex flex-col gap-stack-sm">
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-lowest/40 border border-outline/20 py-3 rounded-lg text-on-surface font-body-md text-body-md hover:bg-surface-container-lowest transition-colors backdrop-blur-md">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"></path></svg>
                    Continue with Apple
                </button>
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-lowest/40 border border-outline/20 py-3 rounded-lg text-on-surface font-body-md text-body-md hover:bg-surface-container-lowest transition-colors backdrop-blur-md">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24"><path d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z"></path></svg>
                    Continue with Google
                </button>
</div>
</div>
<!-- Footer Link -->
<div class="text-center mt-stack-lg">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary-container font-medium hover:text-primary transition-colors" href="#">Sign up</a>
</p>
</div>
</main>
</body></html>
