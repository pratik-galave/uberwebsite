                      "inverse-surface": "#e5e2e3",

                      "surface-tint": "#00daf3",
                      "primary-fixed": "#9cf0ff",
                      "tertiary-container": "#d6c9ff",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-background min-h-screen text-on-surface antialiased relative overflow-hidden font-body-md flex items-center justify-center selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Layer -->
<div class="absolute inset-0 z-0">
<img alt="Background" class="w-full h-full object-cover opacity-40" data-alt="Interior view from driver seat of a luxury vehicle at night with glowing city lights blurred in the background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2Kgu2HfrlzaVza5phQNfBPJ66w6H0mnyQugAyWsMAqToh8DC1iHGZImyOWElkagY0RRaViDdo6e5pa3ygDR8ny66MPU2CsWwK6LD10GkL8pqN8m_8OjGr1o1aueJ-F-Xwu6yjUVuhP_PUgwuGnvqIPINMH6qsfhSkUdy2JuPAv22-sUz3iVy-Oh-iavBcyxoAgqR5JAD8YLVJ426-qzvSTvDt7xRH81-4svpjYohoblfoC5CU1rD65Z8gb3zRVa1XZJ9zWOkLm6cb"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/80 to-background/30 backdrop-blur-[2px]"></div>
</div>
<!-- Main Content Canvas (No Nav Shell due to Transactional Intent) -->
<main class="relative z-10 w-full max-w-[440px] px-container-margin py-stack-lg">
<!-- Glassmorphic Login Card -->
<div class="bg-[#141416]/70 backdrop-blur-3xl rounded-[24px] border border-white/10 shadow-[0_20px_40px_rgba(0,0,0,0.4)] relative overflow-hidden">
<!-- Simulated Light Edge -->
<div class="absolute inset-x-0 top-0 h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
<div class="p-8 flex flex-col gap-8">
<!-- Branding Header -->
<div class="flex flex-col items-center text-center gap-2">
<h1 class="font-display-xl text-display-xl tracking-tighter text-white uppercase">Velocity</h1>
<div class="inline-flex items-center gap-2 bg-surface-container/50 px-3 py-1.5 rounded-full border border-white/5">
<span class="material-symbols-outlined icon-fill text-primary-container text-sm" data-icon="local_taxi">local_taxi</span>
<span class="font-label-caps text-label-caps text-primary-container uppercase tracking-widest">Captain Portal</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Sign in to access your fleet dashboard, track earnings, and manage your schedule.</p>
</div>
<!-- Form Area -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Email/Phone Input -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-1">Email or Phone Number</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant group-focus-within:text-primary-container transition-colors" data-icon="person">person</span>
<input class="w-full bg-[#121214] border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 font-body-md text-body-md text-white placeholder:text-outline-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Password</label>
<a class="font-label-caps text-label-caps text-primary-container hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant group-focus-within:text-primary-container transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-[#121214] border border-outline-variant rounded-xl py-3.5 pl-12 pr-12 font-body-md text-body-md text-white placeholder:text-outline-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-2 flex flex-col gap-4">
<button class="w-full bg-primary-container text-on-primary-container font-label-caps text-label-caps uppercase tracking-widest py-4 rounded-xl shadow-[0_0_15px_rgba(0,229,255,0.2)] hover:shadow-[0_0_25px_rgba(0,229,255,0.4)] hover:bg-primary transition-all duration-300 flex justify-center items-center gap-2" type="submit">
                            Sign In to Drive
                            <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-white/10"></div>
<span class="font-label-caps text-label-caps text-outline-variant">OR</span>
<div class="h-[1px] flex-1 bg-white/10"></div>
</div>
<!-- Secondary Glass Action -->
<button class="w-full bg-white/5 border border-white/10 text-white font-label-caps text-label-caps uppercase tracking-widest py-3.5 rounded-xl hover:bg-white/10 transition-colors duration-300 flex justify-center items-center gap-2" type="button">
<span class="material-symbols-outlined text-lg" data-icon="fingerprint">fingerprint</span>
                            Biometric Login
                        </button>
</div>
</form>
</div>
<!-- Earning Potential Footer -->
<div class="bg-surface-container-highest/50 border-t border-white/5 p-6 text-center flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-secondary-container" data-icon="payments">payments</span>
<p class="font-body-md text-body-md text-on-surface">Not a Captain yet?</p>
<a class="font-label-caps text-label-caps text-secondary-container hover:text-secondary hover:underline underline-offset-4 transition-all" href="#">Apply now and maximize your earnings</a>
</div>
</div>
</main>
</body></html>
