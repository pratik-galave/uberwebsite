<!DOCTYPE html>

<style>
        .glass-panel {
            background: rgba(20, 20, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow {
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }
        .map-bg {
            background-color: #0a0a0b;
            background-image: radial-gradient(circle at center, #1a1a1c 0%, #0a0a0b 100%);
        }
        .route-line {
            stroke: #00E5FF;
            stroke-width: 6;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.4));
        }
    </style>

<body class="bg-background text-on-background min-h-screen relative overflow-hidden font-body-md text-body-md">
<!-- Background Map Area (Simulated) -->
<div class="absolute inset-0 z-0 map-bg">
<svg class="w-full h-full opacity-60" preserveaspectratio="none" viewbox="0 0 1000 1000">
<!-- Simulated minimal city grid -->
<path d="M0 200 H1000 M0 400 H1000 M0 600 H1000 M0 800 H1000" stroke="#1c1b1c" stroke-width="2"></path>
<path d="M200 0 V1000 M400 0 V1000 M600 0 V1000 M800 0 V1000" stroke="#1c1b1c" stroke-width="2"></path>
<path d="M100 100 L900 900" opacity="0.3" stroke="#2a2a2b" stroke-width="15"></path>
<!-- Active Route -->
<path class="route-line" d="M500 800 L500 500 L300 300" fill="none"></path>
<!-- Car Marker -->
<circle class="shadow-[0_0_15px_rgba(0,229,255,0.8)]" cx="500" cy="500" fill="#00e5ff" r="12"></circle>
<path d="M495 490 L505 490 L510 510 L490 510 Z" fill="#ffffff"></path>
<!-- Destination Marker -->
<circle class="shadow-[0_0_15px_rgba(5,231,119,0.8)]" cx="300" cy="300" fill="#05e777" r="10"></circle>
</svg>
</div>
<!-- Top Navigation Instructions -->
<div class="absolute top-0 left-0 w-full z-20 px-container-margin pt-container-margin">
<div class="glass-panel rounded-xl p-stack-md flex items-center justify-between shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
<div class="flex items-center gap-stack-md">
<div class="bg-surface-container-high rounded-lg p-unit flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-primary-container text-[40px]" style="font-variation-settings: 'FILL' 1;">turn_right</span>
</div>
<div>
<p class="font-headline-lg text-headline-lg text-on-surface">500 ft</p>
<p class="font-body-lg text-body-lg text-on-surface-variant">Turn right onto Market St</p>
</div>
</div>
<button class="bg-surface-container p-stack-sm rounded-full border border-outline-variant hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined text-on-surface">volume_up</span>
</button>
</div>
<!-- Next Instruction Peek -->
<div class="mt-stack-sm glass-panel rounded-lg p-stack-sm flex items-center gap-stack-sm w-max ml-auto opacity-90 shadow-lg">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">turn_left</span>
<span class="font-data-mono text-data-mono text-on-surface-variant">Then left on 4th St</span>
</div>
</div>
<!-- Floating Action Buttons (Map Controls) -->
<div class="absolute right-container-margin top-1/2 -translate-y-1/2 z-20 flex flex-col gap-stack-sm">
<button class="glass-panel w-12 h-12 rounded-full flex items-center justify-center border border-outline-variant hover:bg-surface-bright transition-colors shadow-lg">
<span class="material-symbols-outlined text-on-surface">my_location</span>
</button>
<button class="glass-panel w-12 h-12 rounded-full flex items-center justify-center border border-outline-variant hover:bg-surface-bright transition-colors shadow-lg">
<span class="material-symbols-outlined text-on-surface">layers</span>
</button>
<div class="glass-panel rounded-full flex flex-col items-center border border-outline-variant shadow-lg mt-stack-md overflow-hidden">
<button class="w-12 h-12 flex items-center justify-center hover:bg-surface-bright transition-colors border-b border-outline-variant">
<span class="material-symbols-outlined text-on-surface">add</span>
</button>
<button class="w-12 h-12 flex items-center justify-center hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined text-on-surface">remove</span>
</button>
</div>
</div>
<!-- Bottom Info Panel -->
<div class="absolute bottom-0 left-0 w-full z-20 px-container-margin pb-safe-area-bottom pt-stack-lg bg-gradient-to-t from-surface-dim via-surface-dim/90 to-transparent">
<div class="glass-panel rounded-xl p-container-margin shadow-[0_-20px_40px_rgba(0,0,0,0.3)]">
<!-- Passenger Context -->
<div class="flex items-center justify-between mb-stack-md border-b border-outline-variant pb-stack-sm">
<div class="flex items-center gap-stack-sm">
<div class="w-10 h-10 rounded-full bg-surface-container-high border border-outline-variant overflow-hidden">

</div>
<div>
<p class="font-body-md text-body-md text-on-surface font-semibold">Sarah J.</p>
<p class="font-label-caps text-label-caps text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px] text-secondary-container" style="font-variation-settings: 'FILL' 1;">star</span> 4.9
                         </p>
</div>
</div>
<div class="flex gap-stack-sm">
<button class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant hover:bg-surface-bright">
<span class="material-symbols-outlined text-on-surface text-[20px]">chat</span>
</button>
<button class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant hover:bg-surface-bright">
<span class="material-symbols-outlined text-on-surface text-[20px]">call</span>
</button>
</div>
</div>
<!-- Trip Metrics -->
<div class="flex items-end justify-between mb-stack-lg">
<div>
<h2 class="font-display-xl text-display-xl text-primary-container neon-glow">14<span class="font-headline-md text-headline-md text-primary-fixed-dim"> min</span></h2>
<p class="font-data-mono text-data-mono text-on-surface-variant mt-1">Arrival at 2:45 PM</p>
</div>
<div class="text-right">
<p class="font-headline-lg text-headline-lg text-on-surface">3.2<span class="font-body-md text-body-md text-on-surface-variant"> mi</span></p>
</div>
</div>
<!-- Actions -->
<div class="flex gap-gutter">
<button class="flex-1 bg-error-container/20 text-error border border-error/30 py-3 px-4 rounded-lg font-body-md text-body-md font-medium hover:bg-error-container/40 transition-colors flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-[20px]">close</span> Cancel
                </button>
<button class="flex-[2] bg-surface-container-high text-on-surface border border-outline-variant py-3 px-4 rounded-lg font-body-md text-body-md font-medium hover:bg-surface-bright transition-colors flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-[20px]">directions_car</span> Dropoff Details
                </button>
</div>
</div>
</div>
