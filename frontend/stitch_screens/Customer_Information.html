<body class="bg-background text-on-background h-screen w-screen overflow-hidden flex flex-col relative selection:bg-primary-container selection:text-on-primary-container">

<div class="absolute inset-0 bg-background/50 backdrop-blur-[2px]"></div>
</div>
<!-- TopAppBar -->
<header class="bg-[#050505]/70 backdrop-blur-3xl top-0 border-b border-white/10 shadow-2xl flex justify-between items-center w-full px-6 py-4 z-50 fixed">
<div class="text-xl font-black tracking-tighter text-white font-inter tracking-tight antialiased">VELOCITY</div>
<div class="flex gap-stack-md">
<span class="material-symbols-outlined text-zinc-500 hover:text-white transition-colors duration-300 cursor-pointer">notifications</span>
<span class="material-symbols-outlined text-zinc-500 hover:text-white transition-colors duration-300 cursor-pointer">account_circle</span>
</div>
</header>
<!-- Main Content Area / Floating Panel Container -->
<main class="flex-1 w-full h-full flex flex-col justify-end p-container-margin pb-safe-area-bottom z-10 pointer-events-none mt-20">
<!-- Customer Info Panel -->
<div class="pointer-events-auto bg-surface-variant/80 backdrop-blur-2xl rounded-xl border-t border-white/10 shadow-[0_20px_40px_rgba(0,0,0,0.6)] p-container-margin flex flex-col gap-stack-md w-full max-w-lg mx-auto relative overflow-hidden">
<!-- Subtle Top Gradient Highlight -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-container/30 to-transparent"></div>
<!-- Rider Profile Section -->
<div class="flex items-center gap-gutter">
<!-- Avatar -->
<div class="w-16 h-16 rounded-full overflow-hidden border border-outline-variant/50 flex-shrink-0 shadow-lg">
<img class="w-full h-full object-cover" data-alt="Professional studio portrait of a young man with short dark hair wearing a minimalist dark tailored jacket" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUKTrad4Pj1xc3d5rIu7JPQ1qLPJWvSjvgjK-6JmiTfdK36_zdR4Bv2sccPWLa_arBiwz05j6uAHMQaN3rf3YbC8d7v52QA1oq5fODgQrXcWMLXE-fSV2_HRQT89_5LGP_MrUtQcg9UIf1xMDn6a-_-c5SadpRra8QheczARVbjAKyciVZ3Pg-_r2Ytz2zCboz59v6clO-2-sIMTjGpasjuf8HO0rIEM3Evcm5atjBEB2nGmb4R0A42b7tLiITtyjSjof2K2zCIEPE"/>
</div>
<!-- Details -->
<div class="flex-1 flex flex-col justify-center">
<h2 class="font-headline-md text-headline-md text-on-surface">Elias Vance</h2>
<div class="flex items-center gap-1 mt-1 text-secondary-fixed">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-data-mono text-data-mono">4.96</span>
<span class="font-body-md text-body-md text-on-surface-variant ml-2">• Velocity Black</span>
</div>
</div>
</div>
<!-- Separator -->
<hr class="border-outline-variant/30 w-full"/>
<!-- Instructions Section -->
<div class="flex flex-col gap-stack-sm bg-surface-container-low/50 rounded-lg p-stack-md border border-white/5">
<div class="flex items-start gap-3">
<div class="w-6 flex justify-center mt-0.5">
<span class="material-symbols-outlined text-primary-container text-[20px]">location_on</span>
</div>
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest mb-1">Pickup Location</span>
<span class="font-body-md text-body-md text-on-surface font-medium">The Pendry Hotel, East Entrance</span>
<p class="font-body-md text-body-md text-on-surface-variant text-sm mt-2 italic border-l-2 border-outline-variant/50 pl-3">"I'll be standing by the valet stand wearing a dark grey overcoat. Please pull up to the second curb."</p>
</div>
</div>
</div>

<!-- Message Button -->
<button class="flex-1 flex items-center justify-center gap-2 bg-surface-container hover:bg-surface-bright backdrop-blur-md rounded-lg py-3.5 border border-outline-variant/50 transition-colors duration-300 group">
<span class="material-symbols-outlined text-on-surface group-hover:text-white transition-colors">chat_bubble</span>
<span class="font-label-caps text-label-caps text-on-surface group-hover:text-white transition-colors">Message</span>
</button>
<!-- Call Button -->
<button class="flex-1 flex items-center justify-center gap-2 bg-primary-container hover:bg-[#00B8D4] shadow-[0_0_20px_rgba(0,229,255,0.2)] rounded-lg py-3.5 transition-all duration-300">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">call</span>
<span class="font-label-caps text-label-caps text-on-primary-container">Call Rider</span>
