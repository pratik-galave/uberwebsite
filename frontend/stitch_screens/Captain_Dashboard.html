<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Velocity - Driver Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#62ff96",
                        "surface-variant": "#353436",
                        "on-tertiary-fixed": "#20005f",
                        "tertiary-fixed": "#e8deff",
                        "surface-container-low": "#1c1b1c",
                        "outline-variant": "#3b494c",
                        "surface": "#131314",
                        "surface-container-highest": "#353436",
                        "secondary-fixed-dim": "#00e475",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#001f24",
                        "on-primary-fixed-variant": "#004f58",
                        "outline": "#849396",
                        "primary-fixed-dim": "#00daf3",
                        "surface-bright": "#3a393a",
                        "on-secondary-fixed-variant": "#005226",
                        "secondary": "#7dffa2",
                        "surface-container-lowest": "#0e0e0f",
                        "secondary-container": "#05e777",
                        "on-secondary-container": "#00622e",
                        "inverse-primary": "#006875",
                        "on-background": "#e5e2e3",
                        "on-tertiary-fixed-variant": "#4f00d0",
                        "on-secondary-fixed": "#00210b",
                        "primary": "#c3f5ff",
                        "on-primary": "#00363d",
                        "on-error-container": "#ffdad6",
                        "on-primary-container": "#00626e",
                        "surface-container-high": "#2a2a2b",
                        "primary-container": "#00e5ff",
                        "inverse-on-surface": "#313031",
                        "on-surface": "#e5e2e3",
                        "surface-dim": "#131314",
                        "inverse-surface": "#e5e2e3",
                        "on-surface-variant": "#bac9cc",
                        "on-tertiary-container": "#622be5",
                        "surface-tint": "#00daf3",
                        "primary-fixed": "#9cf0ff",
                        "tertiary-container": "#d6c9ff",
                        "on-secondary": "#003918",
                        "surface-container": "#201f20",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#cdbdff",
                        "background": "#131314",
                        "on-tertiary": "#370096",
                        "tertiary": "#f1e9ff",
                        "on-error": "#690005"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "stack-md": "16px",
                        "container-margin": "24px",
                        "stack-sm": "8px",
                        "safe-area-bottom": "44px",
                        "gutter": "16px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "display-xl": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "data-mono": ["Inter"]
                    },
                    "fontSize": {
                        "display-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "data-mono": ["14px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(20, 20, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-button {
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
        .glow-online {
            box-shadow: 0 0 20px rgba(98, 255, 150, 0.4);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md relative h-screen w-screen overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Map Background -->
<div class="absolute inset-0 z-0 bg-surface-dim">
<img alt="Map" class="w-full h-full object-cover opacity-60 mix-blend-luminosity" data-alt="High-contrast dark mode satellite map view of a modern metropolitan area with subtle cyan and emerald glowing lines indicating traffic routes." data-location="Metropolis" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlBJpSRIihlr4BoGSJ4b_fhBhQlRtU7p_TNCeJF4dJCzwU_kx0gwvKGL1NyZyPVC0QSJRsa3PBS51Y6t8SrKOqic6hh9toYY6b9uhclj9tFFVlBA5dz_rHn4wEu7If6O9KflMTqiSrUJ-qS_hhk1dccQp5eum6f-srI-f5OyA5hmj6f5hP7lz2SW2s-T5TrJbuGdI1ds5sSAm-btQh75ncptLpy_OASBzwoHLJ3YVMO8vB3ow8rTRfjkkRz4lm8SdPuC14kmI183ek"/>
<!-- Vignette overlay for depth -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-transparent via-background/40 to-background/90 z-10"></div>
</div>
<!-- TopAppBar (Web & Tablet) -->
<nav class="hidden md:flex bg-[#050505]/70 backdrop-blur-3xl docked full-width top-0 z-50 flex justify-between items-center w-full px-6 py-4 border-b border-white/10 shadow-2xl absolute">
<div class="flex items-center gap-4">
<span class="text-xl font-black tracking-tighter text-white font-display-xl">VELOCITY</span>
</div>
<div class="flex items-center gap-8">
<a class="text-cyan-400 font-bold font-body-md hover:text-white transition-colors duration-300" href="#">Drive</a>
<a class="text-zinc-500 font-body-md hover:text-white transition-colors duration-300" href="#">Earnings</a>
<a class="text-zinc-500 font-body-md hover:text-white transition-colors duration-300" href="#">Insights</a>
<a class="text-zinc-500 font-body-md hover:text-white transition-colors duration-300" href="#">Profile</a>
</div>
<div class="flex items-center gap-4">
<button class="text-cyan-400 hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="text-cyan-400 hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="relative z-20 h-full w-full flex flex-col md:pt-24 pb-safe-area-bottom md:pb-0 pointer-events-none">
<!-- Top Status Area (Mobile) / Absolute on Web -->
<div class="w-full p-container-margin flex justify-between items-start pointer-events-auto mt-safe-area-top md:mt-0">
<!-- Offline/Online Toggle -->
<div class="glass-panel rounded-full p-2 flex items-center gap-3 pr-6 cursor-pointer hover:bg-surface-container-high transition-colors">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center glow-online">
<span class="material-symbols-outlined text-on-secondary-fixed" data-weight="fill">power_settings_new</span>
</div>
<div>
<p class="font-label-caps text-secondary-fixed tracking-widest uppercase">Online</p>
<p class="font-data-mono text-on-surface-variant text-xs">Finding trips...</p>
</div>
</div>
<!-- Profile Snippet (Mobile Only) -->
<div class="md:hidden glass-panel rounded-full p-2 flex items-center gap-2 cursor-pointer">
<div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a professional male driver in a dark sleek environment with subtle blue rim lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAfGKz5ITCdTFDRtIEBBNonfdU00_ChY_6Bt8xnkZmWWMII5-XQRGs_l4iz2tISCWbuXmhkKB-CN6y3UE_6PyQcxjoLirRXZCJEo1mfNQOfceA8n-NaSZDLwFwvH_CdUE87v8xT-A_VPjFLo1wjeWw10ObY3454XQ_d9H67yQgdsYH2-sktaCBFqC4M2-JpxIl9tVOqAxHlEtaSUBq-NGZxe4yYa2C4m48r3fk09Qz7JS4uAVojbUG7femMyW4u00ebdwEbUExR1THE"/>
</div>
</div>
</div>
<!-- Spacer to push content down -->
<div class="flex-grow"></div>
<!-- Dashboard Bento Grid (Bottom Area) -->
<div class="w-full p-container-margin pb-32 md:pb-8 pointer-events-auto max-w-5xl mx-auto">
<div class="grid grid-cols-1 md:grid-cols-12 gap-stack-md items-end">
<!-- Main Earnings Panel -->
<div class="glass-panel rounded-xl p-6 md:col-span-8 flex flex-col justify-between relative overflow-hidden group">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-[120px] leading-none" data-weight="fill">payments</span>
</div>
<div class="flex justify-between items-start mb-8 relative z-10">
<div>
<h2 class="font-label-caps text-on-surface-variant uppercase tracking-widest mb-1">Today's Earnings</h2>
<div class="flex items-baseline gap-2">
<span class="font-display-xl text-primary-container">$342</span>
<span class="font-data-mono text-on-surface-variant">.50</span>
</div>
</div>
<div class="bg-surface-container/50 border border-outline-variant rounded-full px-4 py-1.5 flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-secondary-fixed"></div>
<span class="font-data-mono text-xs text-on-surface">Live</span>
</div>
</div>
<!-- Mini Chart Area -->
<div class="h-24 flex items-end gap-2 mt-4 relative z-10">
<div class="w-1/6 bg-primary-container/20 hover:bg-primary-container/40 transition-colors rounded-t-sm h-[30%]"></div>
<div class="w-1/6 bg-primary-container/20 hover:bg-primary-container/40 transition-colors rounded-t-sm h-[50%]"></div>
<div class="w-1/6 bg-primary-container/20 hover:bg-primary-container/40 transition-colors rounded-t-sm h-[40%]"></div>
<div class="w-1/6 bg-primary-container/20 hover:bg-primary-container/40 transition-colors rounded-t-sm h-[70%]"></div>
<div class="w-1/6 bg-primary-container/20 hover:bg-primary-container/40 transition-colors rounded-t-sm h-[60%]"></div>
<div class="w-1/6 bg-primary-container rounded-t-sm h-[90%] glow-button relative">
<div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-surface px-2 py-1 rounded text-[10px] font-data-mono text-primary-container hidden group-hover:block">$85</div>
</div>
</div>
</div>
<!-- Right Column Stats -->
<div class="md:col-span-4 flex flex-col gap-stack-md">
<!-- Stat Card 1 -->
<div class="glass-panel rounded-xl p-5 flex justify-between items-center">
<div>
<p class="font-label-caps text-on-surface-variant uppercase tracking-widest mb-1">Trips</p>
<p class="font-headline-lg text-on-surface">14</p>
</div>
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-primary">local_taxi</span>
</div>
</div>
<!-- Stat Card 2 -->
<div class="glass-panel rounded-xl p-5 flex justify-between items-center">
<div>
<p class="font-label-caps text-on-surface-variant uppercase tracking-widest mb-1">Online Time</p>
<p class="font-headline-lg text-on-surface">4h 20m</p>
</div>
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-primary">schedule</span>
</div>
</div>
</div>
</div>
<!-- Quick Actions Row -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-stack-sm mt-stack-md">
<button class="glass-panel rounded-lg p-4 flex flex-col items-center justify-center gap-2 hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">near_me</span>
<span class="font-label-caps text-on-surface tracking-widest">Navigate</span>
</button>
<button class="glass-panel rounded-lg p-4 flex flex-col items-center justify-center gap-2 hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">wallet</span>
<span class="font-label-caps text-on-surface tracking-widest">Cash Out</span>
</button>
<button class="glass-panel rounded-lg p-4 flex flex-col items-center justify-center gap-2 hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">tune</span>
<span class="font-label-caps text-on-surface tracking-widest">Filters</span>
</button>
<button class="glass-panel rounded-lg p-4 flex flex-col items-center justify-center gap-2 hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-error">emergency</span>
<span class="font-label-caps text-error tracking-widest">SOS</span>
</button>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden bg-[#141416]/80 backdrop-blur-2xl fixed bottom-0 w-full rounded-t-3xl border-t border-white/5 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-50 left-0 flex justify-around items-center px-4 pt-3 pb-8">
<button class="flex flex-col items-center justify-center text-cyan-400 drop-shadow-[0_0_8px_rgba(0,229,255,0.5)] scale-90 duration-150">
<span class="material-symbols-outlined mb-1">directions_car</span>
<span class="font-inter text-[11px] font-medium uppercase tracking-widest">Drive</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-300 transition-all">
<span class="material-symbols-outlined mb-1">payments</span>
<span class="font-inter text-[11px] font-medium uppercase tracking-widest">Earnings</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-300 transition-all">
<span class="material-symbols-outlined mb-1">bar_chart</span>
<span class="font-inter text-[11px] font-medium uppercase tracking-widest">Insights</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-300 transition-all">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-inter text-[11px] font-medium uppercase tracking-widest">Profile</span>
</button>
</nav>
</body></html>
