<body class="bg-background text-on-background font-body-md text-body-md antialiased overflow-hidden h-screen w-screen relative selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Suppressed for transactional view, but we can add a minimalist back button overlay) -->
<div class="absolute top-0 left-0 w-full z-50 p-container-margin flex justify-between items-start pointer-events-none">
<button class="pointer-events-auto h-12 w-12 rounded-full bg-surface/80 backdrop-blur-2xl border border-white/10 flex items-center justify-center text-on-surface shadow-2xl hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="pointer-events-auto px-4 py-2 rounded-full bg-surface/80 backdrop-blur-2xl border border-white/10 shadow-2xl flex items-center gap-2">
<span class="h-2 w-2 rounded-full bg-secondary-fixed shadow-[0_0_8px_rgba(98,255,150,0.8)] animate-pulse"></span>
<span class="font-data-mono text-data-mono text-secondary-fixed">LIVE TRACKING</span>
</div>
</div>
<!-- Live Map Canvas -->
<div class="absolute inset-0 z-0">
<!-- Placeholder for actual map implementation -->
<div class="w-full h-full bg-surface-container-lowest relative overflow-hidden" data-alt="Dark, stylized map view of a city grid with muted tones and a subtle blue tint, top-down perspective" data-location="New York City" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAuRqoPoAQSOsvUPbxJMj1GwvY1TKp49dPPKw9R34ezADVdpvlFOeLzDT3ThlIJJu8uCrc79eeXemwYCVnZqFCCvsLe-jC4Qybrtc_Z0WEUMXFOQqfOcSZ9UZxLelcwN6VWunVzr1_bNFuJDKR0lF7kUCQejE2hQnXxAEEner9WhMGErVW3hO_x-sSfRG-Ar7xt8uNIJrAEJHZB4-oswpPUDtv37w0yN2uIHxZV4M94EXSe_RYLGxrHXzWgil27X4vvGyg9z17Bg_8I'); background-size: cover; background-position: center;">

<div class="absolute inset-0 bg-background/60 backdrop-blur-[2px]"></div>
<!-- Route Line (Decorative) -->
<svg class="absolute top-1/4 left-1/4 w-1/2 h-1/2 overflow-visible pointer-events-none" preserveaspectratio="none" viewbox="0 0 100 100">
<path class="opacity-80 drop-shadow-[0_0_8px_rgba(0,229,255,0.6)]" d="M 10 90 Q 30 50 80 10" fill="none" stroke="#00e5ff" stroke-dasharray="4 4" stroke-width="2"></path>
</svg>
<!-- Destination Marker -->
<div class="absolute top-1/4 left-[80%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="h-8 w-8 rounded-full bg-secondary-fixed/20 border border-secondary-fixed flex items-center justify-center backdrop-blur-sm shadow-[0_0_15px_rgba(98,255,150,0.3)]">
<div class="h-3 w-3 rounded-full bg-secondary-fixed shadow-[0_0_8px_rgba(98,255,150,0.8)]"></div>
</div>
</div>
<!-- Driver Marker (Moving towards destination) -->
<div class="absolute top-1/2 left-[45%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<!-- ETA Bubble -->
<div class="mb-2 px-3 py-1 rounded-full bg-surface/90 backdrop-blur-md border border-primary-container/30 shadow-[0_0_15px_rgba(0,229,255,0.2)]">
<span class="font-data-mono text-data-mono text-primary-container drop-shadow-[0_0_5px_rgba(0,229,255,0.5)]">4 MIN</span>
</div>
<!-- Car Icon -->
<div class="h-10 w-10 rounded-full bg-surface shadow-2xl border border-white/10 flex items-center justify-center transform -rotate-45">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
<!-- Glow base -->
<div class="absolute bottom-0 w-12 h-4 bg-primary-container/20 blur-xl rounded-full translate-y-1/2"></div>
</div>
</div>
</div>
<!-- Gradient Overlay to blend Map to Bottom Panel -->
<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-background via-background/80 to-transparent z-10 pointer-events-none"></div>
<!-- Driver Details Panel (Glassmorphic Card) -->
<div class="absolute bottom-0 left-0 w-full z-20 px-container-margin pb-safe-area-bottom pt-container-margin">
<div class="max-w-md mx-auto w-full">
<!-- Contextual Information Above Panel -->
<div class="text-center mb-stack-lg">
<h2 class="font-headline-lg text-headline-lg text-primary-container drop-shadow-[0_0_12px_rgba(0,229,255,0.4)]">Arriving Soon</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Please meet your driver at the pickup point.</p>
</div>

<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
<div class="p-container-margin">
<!-- Driver Profile Row -->
<div class="flex items-center gap-stack-md">
<!-- Avatar -->
<div class="relative">
<div class="h-16 w-16 rounded-full overflow-hidden border-2 border-primary-container p-[2px]">
<img alt="Driver avatar" class="w-full h-full object-cover rounded-full" data-alt="Professional headshot of a driver wearing a dark suit, soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDTyAh3KFzAysL54JxkMXYBYdtgs1l8wu1-Psddh9TeTemyWAZuzZRDs8Kl2dg8tu_2ZTCf4ISi2bkdrJ8jnJtgkc0nTy31tyomhi4GCim4hA0pAPvdxYPaYOWDXTLQz2jJ1gcfDxOyYppRwQg9ycaCansdJSWcHlTFL0JANHPGbwhQWOiIYyoxb4p-gNktrjBfL5T9Cp8KHSIneH5VY6XrKutNLE6b11JhQypaXM8lrv59mmAlH2Yn6XDd0xUqMjyV8wS0QKcvl5x"/>
</div>
<!-- Rating Badge -->
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-surface rounded-full px-2 py-0.5 flex items-center gap-1 border border-white/10 shadow-lg">
<span class="font-data-mono text-[10px] font-bold text-white">4.9</span>
<span class="material-symbols-outlined text-[10px] text-[#FFD700]" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<!-- Info -->
<div class="flex-1">
<h3 class="font-headline-md text-headline-md text-white">Marcus</h3>
<div class="flex items-center gap-2 mt-1">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">electric_car</span>
<p class="font-body-md text-body-md text-on-surface-variant">Tesla Model S</p>
</div>
</div>
<!-- License Plate -->
<div class="bg-surface-container border border-outline-variant rounded-lg px-3 py-1.5 flex items-center justify-center">
<span class="font-data-mono text-data-mono text-primary-container tracking-widest">VEL 0CITY</span>
</div>
</div>
<!-- Divider -->
<div class="h-[1px] w-full bg-white/5 my-stack-md"></div>
<!-- Action Buttons -->
<div class="flex gap-gutter">
<button class="flex-1 h-12 rounded-xl bg-surface/50 border border-white/10 flex items-center justify-center gap-2 text-on-surface hover:bg-surface hover:text-white transition-all backdrop-blur-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">chat_bubble</span>
<span class="font-body-md text-body-md font-medium">Message</span>
</button>
<button class="flex-1 h-12 rounded-xl bg-primary-container/10 border border-primary-container/30 flex items-center justify-center gap-2 text-primary-container hover:bg-primary-container hover:text-on-primary-container transition-all shadow-[0_0_15px_rgba(0,229,255,0.1)] backdrop-blur-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">call</span>
<span class="font-body-md text-body-md font-medium">Call Driver</span>
</button>
</div>
</div>
</div>
</div>
</div>
